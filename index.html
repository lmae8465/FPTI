<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>FPTI — FPV 드론 레이싱 파일럿 성향 테스트</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Noto+Sans+KR:wght@400;500;700;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#090c10;
    --bg-panel:#12181e;
    --bg-panel-2:#1a222a;
    --line:#28333c;
    --line-soft:#1c252d;
    --lime:#c6ff3d;
    --magenta:#ff3d6e;
    --cyan:#3de8ff;
    --yellow:#ffd23d;
    --purple:#b968ff;
    --text:#eaf2ec;
    --text-dim:#7c8a84;
    --text-dim2:#4d5a55;
    --font-display:'Black Han Sans', sans-serif;
    --font-body:'Noto Sans KR', sans-serif;
    --font-mono:'JetBrains Mono', monospace;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    background:
      radial-gradient(circle at 20% -10%, rgba(198,255,61,0.06), transparent 45%),
      radial-gradient(circle at 100% 110%, rgba(255,61,110,0.07), transparent 45%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 42px),
      repeating-linear-gradient(90deg, rgba(255,255,255,0.015) 0px, rgba(255,255,255,0.015) 1px, transparent 1px, transparent 42px),
      var(--bg);
    color:var(--text);
    font-family:var(--font-body);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:24px 14px;
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:0.001ms !important; animation-iteration-count:1 !important; transition-duration:0.001ms !important;}
  }

  .rig{
    width:100%;
    max-width:640px;
    position:relative;
  }

  /* HUD frame corners — the signature motif, reused on every screen */
  .frame{
    position:relative;
    background:linear-gradient(180deg, var(--bg-panel), var(--bg-panel-2));
    border:1px solid var(--line);
    border-radius:4px;
    padding:34px 26px 28px;
    min-height:420px;
    display:flex;
    flex-direction:column;
  }
  .frame::before, .frame::after,
  .frame .cA, .frame .cB{
    content:'';
    position:absolute;
    width:20px; height:20px;
    border:2px solid var(--lime);
    opacity:0.85;
    pointer-events:none;
  }
  .frame::before{ top:-1px; left:-1px; border-right:none; border-bottom:none; }
  .frame::after{ top:-1px; right:-1px; border-left:none; border-bottom:none; }
  .frame .cA{ bottom:-1px; left:-1px; border-right:none; border-top:none; }
  .frame .cB{ bottom:-1px; right:-1px; border-left:none; border-top:none; }

  .topline{
    display:flex; align-items:center; justify-content:space-between;
    font-family:var(--font-mono); font-size:11px; letter-spacing:0.12em;
    color:var(--text-dim); margin-bottom:18px; text-transform:uppercase;
  }
  .rec{ display:flex; align-items:center; gap:6px; color:var(--magenta); }
  .rec .dot{ width:7px; height:7px; border-radius:50%; background:var(--magenta); animation:blink 1.4s infinite; box-shadow:0 0 8px var(--magenta); }
  @keyframes blink{ 0%,55%{opacity:1;} 56%,100%{opacity:0.15;} }
  .lang-switch{ display:flex; gap:4px; }
  .lang-btn{
    background:transparent; border:1px solid var(--line); color:var(--text-dim);
    font-family:var(--font-mono); font-size:10.5px; padding:3px 7px; border-radius:2px;
    cursor:pointer; letter-spacing:0.05em; transition:background 0.15s, color 0.15s, border-color 0.15s;
  }
  .lang-btn:hover{ color:var(--text); border-color:var(--text-dim); }
  .lang-btn.active{ background:var(--lime); color:#0a0f0a; border-color:var(--lime); }

  /* ---------- INTRO ---------- */
  .intro h1{
    font-family:var(--font-display);
    font-size:clamp(46px, 13vw, 68px);
    line-height:0.95;
    letter-spacing:0.01em;
    margin:6px 0 6px;
    color:var(--lime);
    text-shadow:0 0 26px rgba(198,255,61,0.35);
  }
  .intro .sub{
    font-family:var(--font-display);
    font-size:clamp(18px, 5vw, 24px);
    color:var(--text);
    margin:0 0 16px;
  }
  .intro p{
    font-size:14.5px; line-height:1.75; color:var(--text-dim); margin:0 0 22px;
    max-width:46ch;
  }
  .axis-legend{
    display:grid; grid-template-columns:1fr; gap:8px; margin:6px 0 26px;
  }
  .axis-legend .row{
    display:flex; align-items:center; gap:10px;
    font-family:var(--font-mono); font-size:12.5px; color:var(--text-dim);
    border-left:2px solid var(--line); padding:6px 0 6px 12px;
  }
  .axis-legend .row b{ color:var(--text); font-weight:700; }
  .swatch{ width:9px; height:9px; border-radius:2px; flex:none; }

  .meta-row{
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim2);
    display:flex; justify-content:space-between; margin-top:auto; padding-top:18px;
    border-top:1px dashed var(--line-soft);
  }

  .btn{
    appearance:none; border:1px solid var(--lime); background:transparent;
    color:var(--lime); font-family:var(--font-mono); font-weight:700;
    font-size:14px; letter-spacing:0.06em; padding:15px 22px; border-radius:2px;
    cursor:pointer; width:100%; text-align:center; text-transform:uppercase;
    transition:background 0.15s, color 0.15s, box-shadow 0.15s;
  }
  .btn:hover{ background:var(--lime); color:#0a0f0a; box-shadow:0 0 22px rgba(198,255,61,0.35); }
  .btn:active{ transform:translateY(1px); }
  .btn.ghost{ border-color:var(--line); color:var(--text-dim); }
  .btn.ghost:hover{ background:var(--bg-panel-2); color:var(--text); box-shadow:none; }
  .btn-row{ display:flex; gap:10px; margin-top:20px; }

  /* ---------- PROGRESS TICKS ---------- */
  .telemetry{ margin-bottom:22px; }
  .ticks{ display:flex; gap:3px; height:8px; }
  .tick{ flex:1; background:var(--line-soft); border-radius:1px; transition:background 0.25s; }
  .tick.done{ background:var(--tick-color, var(--lime)); }
  .tick.current{ background:var(--text); }
  .telemetry .tlabel{
    display:flex; justify-content:space-between; margin-top:8px;
    font-family:var(--font-mono); font-size:11px; color:var(--text-dim);
  }

  /* ---------- QUESTION ---------- */
  .qtag{
    display:inline-flex; align-items:center; gap:8px;
    font-family:var(--font-mono); font-size:11.5px; font-weight:700;
    letter-spacing:0.08em; padding:4px 10px; border-radius:2px;
    border:1px solid var(--tag-color); color:var(--tag-color); width:fit-content;
    margin-bottom:14px; text-transform:uppercase;
  }
  .qtext{
    font-family:var(--font-display);
    font-size:clamp(21px, 6vw, 27px);
    line-height:1.32; margin:0 0 22px; color:var(--text);
    min-height:2.6em;
  }
  .options{ display:flex; flex-direction:column; gap:9px; }
  .opt{
    display:flex; align-items:center; gap:12px;
    background:var(--bg-panel-2); border:1px solid var(--line);
    border-radius:3px; padding:14px 16px; cursor:pointer;
    font-size:14.5px; color:var(--text); text-align:left;
    transition:border-color 0.15s, background 0.15s, transform 0.1s;
    font-family:var(--font-body);
  }
  .opt .idx{
    font-family:var(--font-mono); font-size:11px; color:var(--text-dim2);
    border:1px solid var(--line); border-radius:50%; width:20px; height:20px;
    display:flex; align-items:center; justify-content:center; flex:none;
  }
  .opt:hover{ border-color:var(--tag-color); background:#1e2830; }
  .opt.selected{ border-color:var(--tag-color); background:rgba(198,255,61,0.07); }
  .opt.selected .idx{ background:var(--tag-color); color:#0a0f0a; border-color:var(--tag-color); }

  .qfoot{
    display:flex; justify-content:space-between; align-items:center;
    margin-top:20px; padding-top:14px; border-top:1px dashed var(--line-soft);
  }
  .link-btn{
    background:none; border:none; color:var(--text-dim); font-family:var(--font-mono);
    font-size:12px; cursor:pointer; padding:6px 4px; letter-spacing:0.04em;
  }
  .link-btn:hover{ color:var(--text); }
  .link-btn:disabled{ opacity:0.3; cursor:default; }

  /* ---------- RESULT ---------- */
  .result-head{ text-align:center; margin-bottom:6px; }
  .result-eyebrow{
    font-family:var(--font-mono); font-size:11.5px; color:var(--text-dim);
    letter-spacing:0.14em; text-transform:uppercase; margin-bottom:10px;
  }
  .code-row{ display:flex; justify-content:center; gap:8px; margin:8px 0 16px; flex-wrap:wrap; }
  .code-chip{
    width:46px; height:46px; border-radius:4px; display:flex; align-items:center; justify-content:center;
    font-family:var(--font-display); font-size:24px; color:#0a0f0a;
    box-shadow:0 0 18px rgba(0,0,0,0.4);
  }
  .result-title{
    font-family:var(--font-display); font-size:clamp(22px,6vw,28px); text-align:center;
    color:var(--lime); margin:0 0 18px; line-height:1.3;
    text-shadow:0 0 20px rgba(198,255,61,0.3);
  }
  .summary{
    font-size:14px; line-height:1.8; color:var(--text-dim); text-align:center;
    max-width:48ch; margin:0 auto 26px; padding:0 4px;
  }
  .summary b{ color:var(--text); font-weight:700; }

  .radar-wrap{ display:flex; justify-content:center; margin:6px 0 22px; }

  .axis-cards{ display:flex; flex-direction:column; gap:10px; margin-bottom:6px; }
  .axis-card{
    border:1px solid var(--line); background:var(--bg-panel-2); border-radius:3px;
    padding:13px 14px;
  }
  .axis-card .ac-top{
    display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;
    font-family:var(--font-mono); font-size:11px; color:var(--text-dim);
  }
  .axis-card .ac-name{ font-weight:700; font-size:14.5px; font-family:var(--font-body); }
  .bar-track{
    position:relative; height:6px; background:var(--line-soft); border-radius:3px; margin:8px 0 8px;
    overflow:visible;
  }
  .bar-fill{ position:absolute; top:0; bottom:0; left:0; border-radius:3px; }
  .bar-dot{
    position:absolute; top:50%; width:12px; height:12px; border-radius:50%;
    background:var(--text); transform:translate(-50%,-50%);
    box-shadow:0 0 0 3px var(--bg-panel-2), 0 0 10px rgba(0,0,0,0.5);
  }
  .ac-poles{ display:flex; justify-content:space-between; font-size:12px; color:var(--text-dim); }
  .ac-desc{ font-size:13px; line-height:1.6; color:var(--text-dim); margin-top:9px; }

  .frame.result-frame{ min-height:auto; }

  @media (max-width:400px){
    .frame{ padding:26px 16px 22px; }
    .btn-row{ flex-direction:column; }
  }
</style>
</head>
<body>

<div class="rig">
  <div class="frame" id="frame">
    <span class="cA"></span><span class="cB"></span>
    <div class="topline">
      <span>FPTI // FPV PILOT TYPE INDEX</span>
      <div class="lang-switch" id="langSwitch">
        <button class="lang-btn active" data-lang="ko">KO</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="ja">JA</button>
      </div>
      <span class="rec"><span class="dot"></span>LIVE</span>
    </div>
    <div id="screen"></div>
  </div>
</div>

<script>
/* ===================== I18N ===================== */
let LANG = 'ko';
const T = (o)=> (o && (o[LANG] || o.ko)) || '';

const STR = {
  ko:{
    title:"FPTI — FPV 드론 레이싱 파일럿 성향 테스트",
    introSub:"FPV RACER PERSONALITY",
    introP:"32개의 실전 상황으로 당신의 레이싱 성향을 5개 축으로 진단합니다. 정답은 없습니다 — 트랙 위에서 순간적으로 드는 생각을 고르세요.",
    axisLegendRow:(a)=>`<b>${a.A.letter}/${a.B.letter}</b> — ${T(a.name)} (${T(a.A.name)} vs ${T(a.B.name)})`,
    start:"시작하기 ▶",
    qTotal:"Q.TOTAL 32",
    estTime:"EST. 4–6 MIN",
    prev:"◀ 이전",
    skip:"건너뛰기 (중립)",
    resultEyebrow:"RESULT LOCKED — 진단 완료",
    typeSuffix:"타입",
    restart:"다시 하기",
    share:"스크린샷으로 결과 공유 ▶",
    shareAlert:"이 화면을 캡처해서 공유해보세요! 📸",
    summaryTpl:(P)=>`트랙 위에서는 <b>${T(P.AL.short)}</b> 방식으로 승부를 보고, 세팅은 <b>${T(P.TF.short)}</b>으로 접근합니다. 연습은 <b>${T(P.GS.short)}</b> 스타일이며, <b>${T(P.QR.short)}</b>으로 훈련하고, <b>${T(P.OH.short)}</b> 코스에서 가장 빛을 발합니다.`,
  },
  en:{
    title:"FPTI — FPV Drone Racing Pilot Type Index",
    introSub:"FPV RACER PERSONALITY",
    introP:"32 real racing scenarios diagnose your racing personality across 5 axes. There are no right answers — just pick the thought that hits you first on the track.",
    axisLegendRow:(a)=>`<b>${a.A.letter}/${a.B.letter}</b> — ${T(a.name)} (${T(a.A.name)} vs ${T(a.B.name)})`,
    start:"Start ▶",
    qTotal:"Q.TOTAL 32",
    estTime:"EST. 4–6 MIN",
    prev:"◀ Prev",
    skip:"Skip (Neutral)",
    resultEyebrow:"RESULT LOCKED — Diagnosis Complete",
    typeSuffix:"Type",
    restart:"Restart",
    share:"Share result via screenshot ▶",
    shareAlert:"Take a screenshot of this screen to share it! 📸",
    summaryTpl:(P)=>`On track, you compete in a <b>${T(P.AL.short)}</b> way, and approach tuning like a <b>${T(P.TF.short)}</b>. You practice in a <b>${T(P.GS.short)}</b> style, train as a <b>${T(P.QR.short)}</b>, and shine brightest on <b>${T(P.OH.short)}</b> tracks.`,
  },
  ja:{
    title:"FPTI — FPVドローンレーシング パイロット性格診断",
    introSub:"FPV RACER PERSONALITY",
    introP:"32個の実戦シチュエーションで、あなたのレーシング性向を5つの軸で診断します。正解はありません — トラックの上で瞬間的に浮かんだ考えを選んでください。",
    axisLegendRow:(a)=>`<b>${a.A.letter}/${a.B.letter}</b> — ${T(a.name)} (${T(a.A.name)} vs ${T(a.B.name)})`,
    start:"スタート ▶",
    qTotal:"Q.TOTAL 32",
    estTime:"EST. 4–6 MIN",
    prev:"◀ 戻る",
    skip:"スキップ(中立)",
    resultEyebrow:"RESULT LOCKED — 診断完了",
    typeSuffix:"タイプ",
    restart:"もう一度",
    share:"スクリーンショットで結果をシェア ▶",
    shareAlert:"この画面をスクリーンショットしてシェアしてみてください！📸",
    summaryTpl:(P)=>`トラック上では<b>${T(P.AL.short)}</b>なやり方で勝負し、セッティングは<b>${T(P.TF.short)}</b>で取り組みます。練習は<b>${T(P.GS.short)}</b>スタイルで、<b>${T(P.QR.short)}</b>として鍛え、<b>${T(P.OH.short)}</b>コースで一番輝きます。`,
  },
};

/* ===================== DATA ===================== */

const AXES = {
  AL: { name:{ko:"공격성",en:"Aggression",ja:"攻撃性"}, color:'var(--magenta)', hex:'#ff3d6e',
        A:{letter:"A",name:{ko:"어택 Attack",en:"Attack",ja:"アタック(Attack)"},short:{ko:"공격적인",en:"Aggressive",ja:"攻撃的な"},desc:{ko:"애매한 순간에도 추월을 시도하고, 위험을 감수해서라도 앞으로 나아갑니다. 완벽한 랩보다 승부처를 만드는 그 순간을 즐깁니다.",en:"You attempt overtakes even in borderline moments, pushing forward at the risk of a crash. You would rather create a decisive moment than fly a flawless but safe lap.",ja:"際どい瞬間でもオーバーテイクを仕掛け、リスクを負ってでも前に出ます。完璧なラップより、勝負を仕掛ける瞬間を楽しむタイプです。"}},
        B:{letter:"L",name:{ko:"라인 Line",en:"Line",ja:"ライン(Line)"},short:{ko:"정교한",en:"Precise",ja:"精密な"},desc:{ko:"무리한 추월보다 깨끗한 라인을 우선합니다. 손해를 보더라도 다음 기회, 완벽한 진입 타이밍을 기다리는 편입니다.",en:"You prioritize a clean line over a risky overtake. Even if it costs you a position, you would rather wait for the next chance and a perfect entry.",ja:"無理なオーバーテイクよりクリーンなラインを優先します。多少損をしても、次のチャンスや完璧な進入タイミングを待つタイプです。"}} },
  TF: { name:{ko:"세팅",en:"Tuning",ja:"セッティング"}, color:'var(--cyan)', hex:'#3de8ff',
        A:{letter:"T",name:{ko:"튜너 Tuner",en:"Tuner",ja:"チューナー(Tuner)"},short:{ko:"세팅파",en:"Data-driven",ja:"データ派"},desc:{ko:"PID, 레이트, 블랙박스 로그로 원인을 찾고 수치로 세팅을 잡아갑니다. 재현 가능한 좋은 세팅을 신뢰합니다.",en:"You find the cause through PIDs, rates, and blackbox logs, dialing in your setup with numbers. You trust a good setup that is reproducible.",ja:"PID、レート、ブラックボックスログで原因を探り、数値でセッティングを詰めていきます。再現性のある良いセッティングを信頼します。"}},
        B:{letter:"F",name:{ko:"필 Feel",en:"Feel",ja:"フィール(Feel)"},short:{ko:"감각파",en:"Instinct-driven",ja:"感覚派"},desc:{ko:"숫자보다 손끝의 감각을 믿습니다. 일단 날려보고, 몸에 맞는 느낌으로 세팅을 완성해 갑니다.",en:"You trust your fingertips more than numbers. You just fly it, then finish the setup by feel until it matches your body.",ja:"数字より指先の感覚を信じます。とりあえず飛ばしてみて、体に合う感覚でセッティングを仕上げていきます。"}} },
  GS: { name:{ko:"연습 스타일",en:"Practice Style",ja:"練習スタイル"}, color:'var(--lime)', hex:'#c6ff3d',
        A:{letter:"G",name:{ko:"그라인더 Grinder",en:"Grinder",ja:"グラインダー(Grinder)"},short:{ko:"그라인더",en:"Grinder",ja:"グラインダー"},desc:{ko:"같은 구간을 몇 시간이고 반복하며 랩타임을 깎아내는 데서 성취감을 느낍니다. 목표는 명확히 기록입니다.",en:"You feel accomplished grinding the same section for hours, shaving off lap times. Your goal is clearly the record.",ja:"同じ区間を何時間も繰り返し、ラップタイムを削っていくことに達成感を感じます。目標は明確に記録です。"}},
        B:{letter:"S",name:{ko:"스타일 Style",en:"Style",ja:"スタイル(Style)"},short:{ko:"스타일리시한",en:"Stylish",ja:"スタイリッシュな"},desc:{ko:"반복보다 다양한 시도와 멋진 장면을 즐깁니다. 기록보다 그 순간의 재미와 트릭이 우선입니다.",en:"You enjoy variety and cool moments more than repetition. Fun and tricks in the moment matter more than the record.",ja:"繰り返しよりも多様な挑戦とかっこいい瞬間を楽しみます。記録よりその瞬間の楽しさやトリックが優先です。"}} },

let current = 0;
const answers = new Array(QUESTIONS.length).fill(null); // score chosen
const screen = document.getElementById('screen');
let screenMode = 'intro'; // 'intro' | 'question' | 'result'

function setLang(l){
  LANG = l;
  document.documentElement.lang = l;
  document.title = STR[l].title;
  document.querySelectorAll('.lang-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.lang===l);
  });
  if(screenMode==='intro') renderIntro();
  else if(screenMode==='question') renderQuestion();
  else renderResult();
}
document.querySelectorAll('.lang-btn').forEach(b=>{
  b.onclick = ()=> setLang(b.dataset.lang);
});

/* ===================== RENDER: INTRO ===================== */
function renderIntro(){
  screenMode = 'intro';
  const s = STR[LANG];
  screen.innerHTML = `
    <div class="intro">
      <div class="sub">${s.introSub}</div>
      <h1>FPTI</h1>
      <p>${s.introP}</p>
      <div class="axis-legend">
        ${AXIS_ORDER.map(k=>{
          const a = AXES[k];
          return `<div class="row"><span class="swatch" style="background:${a.hex}"></span>
            ${s.axisLegendRow(a)}</div>`;
        }).join('')}
      </div>
      <button class="btn" id="startBtn">${s.start}</button>
      <div class="meta-row">
        <span>${s.qTotal}</span>
        <span>${s.estTime}</span>
      </div>
    </div>
  `;
  document.getElementById('startBtn').onclick = ()=>{ current=0; renderQuestion(); };
}

/* ===================== RENDER: TICKS ===================== */
function renderTicks(){
  const ticks = QUESTIONS.map((q,i)=>{
    const color = AXES[q.axis].hex;
    let cls = 'tick';
    if(i===current) cls += ' current';
    else if(answers[i]!==null) cls += ' done';
    const style = (answers[i]!==null && i!==current) ? `style="--tick-color:${color}"` : '';
    return `<div class="${cls}" ${style}></div>`;
  }).join('');
  return `
    <div class="telemetry">
      <div class="ticks">${ticks}</div>
      <div class="tlabel"><span>Q ${String(current+1).padStart(2,'0')} / ${QUESTIONS.length}</span><span>${T(AXES[QUESTIONS[current].axis].name).toUpperCase()}</span></div>
    </div>
  `;
}

/* ===================== RENDER: QUESTION ===================== */
function renderQuestion(){
  screenMode = 'question';
  const s = STR[LANG];
  const q = QUESTIONS[current];
  const axis = AXES[q.axis];
  screen.style.setProperty('--tag-color', axis.hex);

  screen.innerHTML = `
    ${renderTicks()}
    <div class="qtag" style="--tag-color:${axis.hex}">${q.axis} · ${T(axis.name)}</div>
    <div class="qtext">${T(q.text)}</div>
    <div class="options">
      ${q.options.map((o,i)=>`
        <button class="opt ${answers[current]===o.score?'selected':''}" data-i="${i}">
          <span class="idx">${i+1}</span><span>${T(o.text)}</span>
        </button>`).join('')}
    </div>
    <div class="qfoot">
      <button class="link-btn" id="prevBtn" ${current===0?'disabled':''}>${s.prev}</button>
      <button class="link-btn" id="skipBtn">${s.skip}</button>
    </div>
  `;

  document.querySelectorAll('.opt').forEach(btn=>{
    btn.onclick = ()=>{
      const i = parseInt(btn.dataset.i,10);
      answers[current] = q.options[i].score;
      document.querySelectorAll('.opt').forEach(b=>b.classList.remove('selected'));
      btn.classList.add('selected');
      setTimeout(()=>{
        if(current < QUESTIONS.length-1){ current++; renderQuestion(); }
        else { renderResult(); }
      }, 240);
    };
  });

  document.getElementById('prevBtn').onclick = ()=>{
    if(current>0){ current--; renderQuestion(); }
  };
  document.getElementById('skipBtn').onclick = ()=>{
    answers[current] = 0;
    if(current < QUESTIONS.length-1){ current++; renderQuestion(); }
    else { renderResult(); }
  };
}

/* ===================== SCORING ===================== */
function computeScores(){
  const raw = {AL:0, TF:0, GS:0, QR:0, OH:0};
  const max = {AL:0, TF:0, GS:0, QR:0, OH:0};
  QUESTIONS.forEach((q,i)=>{
    raw[q.axis] += (answers[i]||0);
    max[q.axis] += 2;
  });
  const result = {};
  AXIS_ORDER.forEach(k=>{
    const pct = ((raw[k]/max[k]) + 1) / 2 * 100; // 0~100, 100 = full pole A
    const letter = pct>=50 ? AXES[k].A.letter : AXES[k].B.letter;
    result[k] = {raw:raw[k], max:max[k], pct:Math.round(pct), letter};
  });
  return result;
}

/* ===================== RADAR SVG ===================== */
function radarSVG(scores){
  const size=280, cx=size/2, cy=size/2, R=104;
  const n=5;
  const pts = AXIS_ORDER.map((k,i)=>{
    const angle = -Math.PI/2 + i*(2*Math.PI/n);
    const val = scores[k].pct/100;
    return {
      x: cx + Math.cos(angle)*R*val,
      y: cy + Math.sin(angle)*R*val,
      lx: cx + Math.cos(angle)*(R+26),
      ly: cy + Math.sin(angle)*(R+26),
      hex: AXES[k].hex,
      label: scores[k].letter
    };
  });
  const rings=[0.25,0.5,0.75,1];
  const ringPolys = rings.map(r=>{
    const p = Array.from({length:n}).map((_,i)=>{
      const angle=-Math.PI/2+i*(2*Math.PI/n);
      return `${cx+Math.cos(angle)*R*r},${cy+Math.sin(angle)*R*r}`;
    }).join(' ');
    return `<polygon points="${p}" fill="none" stroke="#28333c" stroke-width="1"/>`;
  }).join('');
  const axisLines = Array.from({length:n}).map((_,i)=>{
    const angle=-Math.PI/2+i*(2*Math.PI/n);
    return `<line x1="${cx}" y1="${cy}" x2="${cx+Math.cos(angle)*R}" y2="${cy+Math.sin(angle)*R}" stroke="#28333c" stroke-width="1"/>`;
  }).join('');
  const dataPoly = pts.map(p=>`${p.x},${p.y}`).join(' ');
  const dots = pts.map(p=>`<circle cx="${p.x}" cy="${p.y}" r="4" fill="${p.hex}" />`).join('');
  const labels = pts.map(p=>`<text x="${p.lx}" y="${p.ly}" fill="${p.hex}" font-family="JetBrains Mono, monospace" font-size="13" font-weight="700" text-anchor="middle" dominant-baseline="middle">${p.label}</text>`).join('');

  return `
  <svg width="${size}" height="${size+16}" viewBox="0 0 ${size} ${size+16}">
    <g transform="translate(0,8)">
      ${ringPolys}
      ${axisLines}
      <polygon points="${dataPoly}" fill="rgba(198,255,61,0.14)" stroke="#c6ff3d" stroke-width="2"/>
      ${dots}
      ${labels}
    </g>
  </svg>`;
}

/* ===================== RENDER: RESULT ===================== */
function renderResult(){
  screenMode = 'result';
  const s = STR[LANG];
  const scores = computeScores();
  const code = AXIS_ORDER.map(k=>scores[k].letter).join('');

  const poleOf = (k)=> scores[k].letter===AXES[k].A.letter ? AXES[k].A : AXES[k].B;
  const P = {}; AXIS_ORDER.forEach(k=> P[k]=poleOf(k));

  const summary = s.summaryTpl(P);

  const axisCardsHTML = AXIS_ORDER.map(k=>{
    const a = AXES[k]; const sc = scores[k]; const p = P[k];
    const pctFromLeft = sc.letter===a.A.letter ? sc.pct : 100-sc.pct;
    return `
    <div class="axis-card">
      <div class="ac-top"><span>${k} · ${T(a.name)}</span><span>${sc.raw>0?'+':''}${sc.raw} / ±${sc.max}</span></div>
      <div class="ac-name" style="color:${a.hex}">${p.letter} — ${T(p.name)}</div>
      <div class="bar-track">
        <div class="bar-fill" style="width:100%; background:linear-gradient(90deg, ${a.hex}55, ${a.hex}11);"></div>
        <div class="bar-dot" style="left:${pctFromLeft}%; background:${a.hex};"></div>
      </div>
      <div class="ac-poles"><span>${a.A.letter} ${T(a.A.short)}</span><span>${a.B.letter} ${T(a.B.short)}</span></div>
      <div class="ac-desc">${T(p.desc)}</div>
    </div>`;
  }).join('');

  screen.innerHTML = `
    <div class="result-head">
      <div class="result-eyebrow">${s.resultEyebrow}</div>
      <div class="code-row">
        ${AXIS_ORDER.map(k=>`<div class="code-chip" style="background:${AXES[k].hex}">${scores[k].letter}</div>`).join('')}
      </div>
      <div class="result-title">${code} ${s.typeSuffix}</div>
      <div class="summary">${summary}</div>
    </div>
    <div class="radar-wrap">${radarSVG(scores)}</div>
    <div class="axis-cards">${axisCardsHTML}</div>
    <div class="btn-row">
      <button class="btn ghost" id="restartBtn">${s.restart}</button>
      <button class="btn" id="rerunBtn">${s.share}</button>
    </div>
    <div class="meta-row">
      <span>FPTI v1.0</span>
      <span>#${code} #FPVRACER</span>
    </div>
  `;

  document.getElementById('restartBtn').onclick = ()=>{
    answers.fill(null); current=0; renderIntro();
  };
  document.getElementById('rerunBtn').onclick = ()=>{
    alert(STR[LANG].shareAlert);
  };
}

/* ===================== INIT ===================== */
renderIntro();
</script>
